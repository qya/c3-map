<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback | C3 Code</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f8fb;
        --panel: #ffffff;
        --text: #1f2937;
        --muted: #667085;
        --line: #d9e1ec;
        --accent: #1967d2;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #151a21;
          --panel: #202734;
          --text: #eef2f7;
          --muted: #a9b4c2;
          --line: #374151;
          --accent: #8ab4f8;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(720px, calc(100% - 32px));
        margin: 0 auto;
        padding: 56px 0;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 32px;
        box-shadow: 0 18px 50px rgb(15 23 42 / 0.12);
      }

      a {
        color: var(--accent);
      }

      h1 {
        margin: 0;
        font-size: clamp(2rem, 5vw, 3.25rem);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.7;
      }

      label {
        display: block;
        margin-top: 18px;
        font-size: 0.9rem;
        font-weight: 700;
      }

      input,
      textarea {
        width: 100%;
        margin-top: 8px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: transparent;
        color: var(--text);
        font: inherit;
        padding: 12px;
      }

      textarea {
        min-height: 150px;
        resize: vertical;
      }

      button {
        margin-top: 20px;
        border: 0;
        border-radius: 6px;
        background: var(--accent);
        color: white;
        cursor: pointer;
        font: inherit;
        font-weight: 700;
        padding: 12px 18px;
      }

      .note {
        border-top: 1px solid var(--line);
        margin-top: 24px;
        padding-top: 18px;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <a href="/">Back to map</a>
        <h1>Feedback</h1>
        <p>
          Share what should be improved in C3 Code. Include a coordinate, C3 code, H3 index, or browser details when
          the issue is location-specific.
        </p>
        <form action="mailto:feedback@example.com" method="post" enctype="text/plain">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" />

          <label for="message">Message</label>
          <textarea id="message" name="message" placeholder="What happened?"></textarea>

          <button type="submit">Send feedback</button>
        </form>
        <p class="note">
          This page uses your mail app to send feedback. Replace the email address in this file when a production
          inbox is ready.
        </p>
      </section>
    </main>
  </body>
</html>
